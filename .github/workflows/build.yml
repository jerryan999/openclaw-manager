name: Build (macOS + Windows)

on:
  push:
    tags:
      - "v*"
    branches:
      - dev
  schedule:
    # 每日 02:00 UTC 构建一次（不创建 Release，仅产出 artifacts）
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/build-app.yml
    with:
      vite_register_url: ''
      artifact_suffix: ''

  release:
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: openclaw-manager-macos
          path: openclaw-manager-macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: openclaw-manager-windows
          path: openclaw-manager-windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            openclaw-manager-macos/**/*.dmg
            openclaw-manager-windows/**/*.exe
